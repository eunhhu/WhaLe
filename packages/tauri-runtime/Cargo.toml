[package]
name = "whale-tauri-runtime"
version = "0.1.0"
edition = "2021"

[dependencies]
tauri = { version = "2", features = ["tray-icon", "devtools"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
rdev = { git = "https://github.com/fufesou/rdev" }
frida = { version = "0.17", features = ["auto-download"] }
crossbeam-channel = "0.5"
log = "0.4"
env_logger = "0.11"
tauri-plugin-log = "2"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = { version = "0.3", features = ["NSColor", "NSWindow", "NSResponder", "NSWindowTabGroup"] }
objc2-web-kit = { version = "0.3", features = ["WKWebView", "WKPreferences", "WKWebViewConfiguration"] }
objc2-foundation = { version = "0.3", features = ["NSString", "NSKeyValueCoding"] }

[build-dependencies]
tauri-build = { version = "2", features = [] }
